# AMA-Bench Evaluation Configuration for VLLM

# Model configuration
provider: "vllm"
model: "/raid/lah003/models/Qwen3-32B"

# VLLM server configuration
vllm_host: "localhost"
vllm_port: 8056

# API request timeout in seconds (increase for high-concurrency workloads)
timeout: 600



enable_thinking: true

# VLLM launch configuration
vllm_launch:
  gpus: "2,4"
  max_model_len: 32000
  max_response_len: 8192
  tensor_parallel_size: 2
  gpu_memory_utilization: 0.6


