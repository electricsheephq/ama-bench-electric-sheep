# OpenAI gpt-5-mini config — used as both the generator (--llm-config)
# and as a template for the Harbor parity certificate.
#
# api_key resolves from OPENAI_API_KEY env var when omitted here.

provider: "openai"
model: "gpt-5-mini"
base_url: "https://api.openai.com/v1"

# Context budget. gpt-5-mini supports a 400K context window; for the
# alfworld parity subset the largest prompt is ~38K tokens so no
# truncation triggers. Keep these aligned with the Harbor parity agent.
max_model_length: 400000
max_response_tokens: 4096
max_tokens: 4096
temperature: 0.0

# Reasoning effort for the Responses-API path in src/model_client.py.
# Matches the convention used by simpleqa, aa-lcr, and the Harbor parity
# agent — minimal reasoning keeps the visible-token budget usable.
reasoning_effort: "minimal"
